project:
  type: website
  output-dir: _site
  render:
    - "!course-inbox/**"
    - "!build/generated/**"
    - "!build/exports/**"
    - "!build/index/**"
    - "!build/reports/**"
    - "!build/site_libs/**"

website:
  title: LearnForge
  search: true
  page-navigation: true

format:
  html:
    theme:
      - cosmo
      - learnforge.scss
    toc: true
    code-copy: true
    number-sections: true
  pdf:
    pdf-engine: pdflatex
    toc: true
    colorlinks: true
  revealjs:
    theme: simple
    slide-number: true
    incremental: false
    transition: none

execute:
  freeze: auto
  echo: false
  warning: false

filters:
  - filters/visibility.lua

metadata-files:
  - _variables.yml
