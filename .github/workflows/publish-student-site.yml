name: Publish Student Site

on:
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish-student-site:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Publish student site bundle
        run: teach publish

      - name: Upload publish report
        uses: actions/upload-artifact@v4
        with:
          name: student-site-publish-report
          path: build/reports/publish/student-site/

      - name: Upload student site for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/publish/student-site/

  deploy:
    needs: publish-student-site
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
