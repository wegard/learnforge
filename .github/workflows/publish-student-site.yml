name: Publish Student Site

on:
  workflow_dispatch:

jobs:
  publish-student-site:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Publish student site bundle
        run: teach publish

      - name: Upload student site bundle
        uses: actions/upload-artifact@v4
        with:
          name: student-site
          path: build/publish/student-site/

      - name: Upload publish manifest
        uses: actions/upload-artifact@v4
        with:
          name: student-site-publish-report
          path: build/reports/publish/student-site/
