<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Gradientnedstigning</title>
  <desc id="desc">En skålformet tapskurve med flere punkter og piler som viser steg nedover mot minimumspunktet nederst i kurven.</desc>
  <defs>
    <style>
      .bg { fill: #f4efe5; }
      .title { font: 700 34px "Source Sans 3", "DejaVu Sans", sans-serif; fill: #14213d; }
      .subtitle { font: 500 18px "Source Sans 3", "DejaVu Sans", sans-serif; fill: #5c677d; }
      .axis { stroke: #22324d; stroke-width: 4; stroke-linecap: round; }
      .tick { stroke: #94a3b8; stroke-width: 2; }
      .axis-label { font: 700 19px "Source Sans 3", "DejaVu Sans", sans-serif; fill: #22324d; }
      .curve { fill: none; stroke: #d97706; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; }
      .path-line { fill: none; stroke: #0f766e; stroke-width: 5; stroke-dasharray: 10 10; }
      .step-arrow { stroke: #0f766e; stroke-width: 4; fill: none; stroke-linecap: round; }
      .point { fill: #0f766e; stroke: #ffffff; stroke-width: 3; }
      .minimum { fill: #14213d; stroke: #ffffff; stroke-width: 4; }
      .callout { fill: #fffaf2; stroke: #d5c7ad; stroke-width: 2; }
      .label { font: 700 17px "Source Sans 3", "DejaVu Sans", sans-serif; fill: #22324d; }
      .note { font: 500 15px "Source Sans 3", "DejaVu Sans", sans-serif; fill: #5c677d; }
    </style>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#0f766e"/>
    </marker>
  </defs>

  <rect class="bg" width="960" height="560" rx="28"/>

  <text class="title" x="88" y="78">Gradientnedstigning</text>
  <text class="subtitle" x="88" y="110">Hvert oppdateringssteg følger gradienten mot lavere tap på tapsflaten.</text>

  <g transform="translate(110 150)">
    <line class="axis" x1="0" y1="320" x2="720" y2="320"/>
    <line class="axis" x1="0" y1="320" x2="0" y2="10"/>

    <line class="tick" x1="170" y1="320" x2="170" y2="332"/>
    <line class="tick" x1="360" y1="320" x2="360" y2="332"/>
    <line class="tick" x1="550" y1="320" x2="550" y2="332"/>
    <line class="tick" x1="-12" y1="240" x2="0" y2="240"/>
    <line class="tick" x1="-12" y1="160" x2="0" y2="160"/>
    <line class="tick" x1="-12" y1="80" x2="0" y2="80"/>

    <text class="axis-label" x="360" y="372" text-anchor="middle">Parameterverdi</text>
    <text class="axis-label" x="-155" y="-54" transform="rotate(-90)" text-anchor="middle">Tap</text>

    <path class="curve" d="M 40 48 C 130 98, 210 156, 286 214 C 320 240, 344 258, 360 266 C 378 258, 402 240, 436 214 C 512 156, 592 98, 680 48"/>

    <path class="path-line" d="M 96 84 L 174 130 L 248 192 L 320 246 L 360 266"/>
    <line class="step-arrow" x1="96" y1="84" x2="170" y2="128" marker-end="url(#arrow)"/>
    <line class="step-arrow" x1="174" y1="130" x2="244" y2="189" marker-end="url(#arrow)"/>
    <line class="step-arrow" x1="248" y1="192" x2="316" y2="243" marker-end="url(#arrow)"/>
    <line class="step-arrow" x1="320" y1="246" x2="356" y2="264" marker-end="url(#arrow)"/>

    <circle class="point" cx="96" cy="84" r="10"/>
    <circle class="point" cx="174" cy="130" r="10"/>
    <circle class="point" cx="248" cy="192" r="10"/>
    <circle class="point" cx="320" cy="246" r="10"/>
    <circle class="minimum" cx="360" cy="266" r="12"/>

    <g transform="translate(446 52)">
      <rect class="callout" width="236" height="82" rx="16"/>
      <text class="label" x="18" y="28">Minimum for tapsfunksjonen</text>
      <text class="note" x="18" y="52">Når gradienten blir liten,</text>
      <text class="note" x="18" y="70">flater oppdateringene ut.</text>
    </g>

    <g transform="translate(40 230)">
      <rect class="callout" width="210" height="72" rx="16"/>
      <text class="label" x="18" y="28">Startpunkt</text>
      <text class="note" x="18" y="52">Læringsraten avgjør hvor store</text>
      <text class="note" x="18" y="70">steg modellen tar nedover.</text>
    </g>
  </g>

  <text class="note" x="88" y="514">Bruk figuren sammen med tapsfunksjonen for å forklare hvorfor for store steg kan gi ustabil læring, mens for små steg gjør treningen treg.</text>
</svg>
