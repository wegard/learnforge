<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" role="img" aria-labelledby="bv-title bv-desc">
  <title id="bv-title">Bias-variance trade-off</title>
  <desc id="bv-desc">Training error decreasing and test error forming a U-shape as model complexity increases.</desc>
  <rect width="560" height="340" rx="18" fill="#f8fafc"/>
  <text x="280" y="32" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#0f172a" font-weight="bold">
    Bias-Variance Trade-off
  </text>

  <!-- Axes -->
  <line x1="70" y1="280" x2="520" y2="280" stroke="#94a3b8" stroke-width="2"/>
  <line x1="70" y1="280" x2="70" y2="50" stroke="#94a3b8" stroke-width="2"/>
  <text x="295" y="320" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#475569">Model complexity</text>
  <text x="24" y="165" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#475569" transform="rotate(-90 24 165)">Error</text>

  <!-- Training error curve (decreasing) -->
  <path d="M90 120 C160 115, 240 100, 320 88 C380 80, 440 74, 500 70"
        fill="none" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
  <text x="505" y="62" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#2563eb">Training error</text>

  <!-- Test error curve (U-shape) -->
  <path d="M90 130 C150 115, 200 108, 260 110 C320 115, 380 140, 440 185 C470 210, 490 235, 500 250"
        fill="none" stroke="#dc2626" stroke-width="3" stroke-linecap="round"/>
  <text x="505" y="256" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#dc2626">Test error</text>

  <!-- Optimal complexity marker -->
  <line x1="260" y1="110" x2="260" y2="280" stroke="#16a34a" stroke-width="2" stroke-dasharray="8 6"/>
  <circle cx="260" cy="110" r="6" fill="#16a34a" stroke="white" stroke-width="2"/>
  <text x="260" y="298" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="11" fill="#16a34a" font-weight="bold">Optimal</text>

  <!-- Region labels -->
  <text x="150" y="270" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#64748b" font-style="italic">Underfitting</text>
  <text x="420" y="270" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="12" fill="#64748b" font-style="italic">Overfitting</text>
</svg>
